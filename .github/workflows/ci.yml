name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'app/**'
              - 'core/**'
              - 'feature/**'
              - 'shared/**'
              - 'build-logic/**'
              - '*.gradle.kts'
              - 'gradle/**'
            ios:
              - 'iosApp/**'
              - 'shared/**'
              - 'core/domain/**'
              - 'build-logic/**'
              - '*.gradle.kts'
              - 'gradle/**'

  android-compile:
    needs: changes
    if: needs.changes.outputs.android == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
      - name: Compile debug Kotlin
        run: ./gradlew compileDebugKotlin

  android-lint:
    needs: changes
    if: needs.changes.outputs.android == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
      - name: Run Android Lint
        run: ./gradlew lint
      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint-results-*.html'

  android-ktlint:
    needs: changes
    if: needs.changes.outputs.android == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run ktlint
        run: ./gradlew ktlintCheck -x compileKotlinIosArm64 -x compileKotlinIosSimulatorArm64
      - name: Upload ktlint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-reports
          path: '**/build/reports/ktlint/'

  shared-test:
    needs: changes
    if: needs.changes.outputs.android == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

  ios-build:
    needs: changes
    if: needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.2.10
          restore-keys: |
            konan-${{ runner.os }}-kotlin-
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build KMP frameworks
        run: |
          ./gradlew \
            :shared:di:linkDebugFrameworkIosSimulatorArm64 \
            :shared:data:linkDebugFrameworkIosSimulatorArm64 \
            :shared:feature-download:linkDebugFrameworkIosSimulatorArm64 \
            :shared:feature-history:linkDebugFrameworkIosSimulatorArm64 \
            :shared:feature-library:linkDebugFrameworkIosSimulatorArm64 \
            :shared:network:linkDebugFrameworkIosSimulatorArm64 \
            :core:domain:linkDebugFrameworkIosSimulatorArm64 \
            -Pkotlin.native.binary.linkParallelism=2
      - name: Build iOS app
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            build
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
